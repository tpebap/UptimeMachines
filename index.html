<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<title>Uptime Machines</title>
</head>
<body class="bg-[#0b0f1a] text-gray-100 font-sans">
<div class="max-w-5xl mx-auto px-4 py-12">

<h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 mb-8 text-center">
UPTIME MACHINES
</h1>

<table class="w-full text-left border-collapse">
<thead class="text-gray-500 text-xs uppercase">
<tr>
<th class="p-4">Rank</th>
<th class="p-4">Machine Name</th>
<th class="p-4">Uptime</th>
<th class="p-4">Status</th>
</tr>
</thead>
<tbody id="machines" class="divide-y divide-slate-800"></tbody>
</table>
</div>

<script>
function formatUptime(seconds) {
    const days = Math.floor(seconds / 86400);
    seconds %= 86400;
    const hours = Math.floor(seconds / 3600);
    seconds %= 3600;
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${days}:${hours}:${minutes}:${secs}`;
}

async function loadMachines() {
    try {
        const res = await fetch('https://devilshell.eu.org:8080/api/machines');
        const data = await res.json();

        const tbody = document.getElementById('machines');
        tbody.innerHTML = '';

        data.forEach((m, idx) => {
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-cyan-500/5 transition-colors group';

            const statusColor = m.status === 'Online' ? 'text-green-400' : 'text-red-400';

            tr.innerHTML = `
                <td class="p-4 font-mono text-cyan-400 text-lg">#${idx+1}</td>
                <td class="p-4 font-bold text-lg">${m.name}<div class="text-xs text-gray-500">Machine Info</div></td>
                <td class="p-4 font-mono text-blue-400 text-lg">${formatUptime(m.total_seconds)}</td>
                <td class="p-4 ${statusColor} font-bold">${m.status}</td>
            `;
            tbody.appendChild(tr);
        });
    } catch(e) {
        console.error(e);
    }
}

loadMachines();
setInterval(loadMachines, 5000);
</script>
</body>
</html>
