<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<title>UptimeMachines | Global Leaderboard</title>
</head>
<body class="bg-[#0b0f1a] text-gray-100 font-sans selection:bg-cyan-500">

<div class="max-w-4xl mx-auto px-4 py-12">
    <div class="text-center mb-8">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600">
            UPTIME MACHINES
        </h1>
        <p class="text-gray-500 uppercase text-sm tracking-widest mt-2">World Ranking System</p>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-slate-800/50 text-xs uppercase tracking-widest text-gray-400">
                <tr>
                    <th class="p-4">Rank</th>
                    <th class="p-4">Machine Name</th>
                    <th class="p-4">Uptime</th>
                    <th class="p-4">Status</th>
                </tr>
            </thead>
            <tbody id="machine-table-body" class="divide-y divide-slate-700">
                <!-- JS ще попълва -->
            </tbody>
        </table>
    </div>
</div>

<script>
async function loadMachines() {
    const res = await fetch("https://devilshell.eu.org/api/machines");
    const machines = await res.json();
    const tbody = document.getElementById("machine-table-body");
    tbody.innerHTML = "";

    machines.forEach((m,index)=>{
        const tr = document.createElement("tr");
        tr.className = "hover:bg-gray-800 transition-colors";

        const statusColor = m.status === "Online" ? "bg-green-500" : "bg-red-500";

        tr.innerHTML = `
            <td class="p-4 font-mono">#${index+1}</td>
            <td class="p-4 font-bold">${m.name}<div class="text-xs text-gray-400">Machine Info</div></td>
            <td class="p-4 font-mono">${formatUptime(m.total_seconds)}</td>
            <td class="p-4 text-right">
                <span class="inline-block w-3 h-3 rounded-full ${statusColor} shadow-[0_0_10px_rgba(34,197,94,0.6)]"></span>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function formatUptime(totalSeconds){
    let s = totalSeconds;
    const days = Math.floor(s/86400); s%=86400;
    const hours = Math.floor(s/3600); s%=3600;
    const mins = Math.floor(s/60); s%=60;
    return `${days}:${hours}:${mins}:${s}`;
}

setInterval(loadMachines, 10000);
loadMachines();
</script>
</body>
</html>
