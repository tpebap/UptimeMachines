<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>UptimeMachines | Global Leaderboard</title>
</head>
<body class="bg-[#0b0f1a] text-gray-100 font-sans selection:bg-cyan-500">
    <div class="max-w-4xl mx-auto px-4 py-12">
        <!-- Başlık Bölümü -->
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 drop-shadow-sm">
                UPTIME MACHINES
            </h1>
            <p class="mt-4 text-gray-500 uppercase tracking-[0.3em] text-sm">World Ranking Systems</p>
        </div>

        <!-- İstatistik Kartları -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 backdrop-blur-xl">
                <p class="text-gray-500 text-xs uppercase mb-1">Total Machines</p>
                <p class="text-2xl font-bold text-cyan-400 tracking-wider">1,402</p>
            </div>
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 backdrop-blur-xl border-b-cyan-500/50">
                <p class="text-gray-500 text-xs uppercase mb-1">Total Online Time</p>
                <p class="text-2xl font-bold text-blue-400 tracking-wider">84 Years</p>
            </div>
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 backdrop-blur-xl">
                <p class="text-gray-500 text-xs uppercase mb-1">Live Now</p>
                <p class="text-2xl font-bold text-green-400 tracking-wider animate-pulse">42</p>
            </div>
        </div>

        <!-- Liderler Tablosu -->
        <div class="bg-slate-900/40 rounded-3xl border border-slate-800 overflow-hidden backdrop-blur-md shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-slate-800/50 text-xs uppercase tracking-widest text-gray-500">
                    <tr>
                        <th class="p-6">Rank</th>
                        <th class="p-6">Machine Name</th>
                        <th class="p-6">Uptime</th>
                        <th class="p-6 text-right">Status</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800">
                    <tr class="hover:bg-cyan-500/5 transition-colors group">
                        <td class="p-6 font-mono text-cyan-400 text-xl">#1</td>
                        <td class="p-6">
                            <div class="font-bold text-lg group-hover:text-cyan-300">tpebap_Mainframe</div>
                            <div class="text-xs text-gray-500">Windows Server 2022</div>
                        </td>
                        <td class="p-6 font-mono text-blue-400 text-lg tracking-tighter">482:14:02:55</td>
                        <td class="p-6 text-right">
                            <span class="inline-block w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]"></span>
                        </td>
                    </tr>
                    <!-- Daha fazla makine buraya gelecek -->
                </tbody>
            </table>
        </div>

        <!-- Alt Menü -->
        <div class="mt-12 flex justify-center gap-4">
            <button class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-cyan-400 transition-all active:scale-95 shadow-xl">
                Get Client v1.0
            </button>
        </div>
    </div>
</body>
</html>
