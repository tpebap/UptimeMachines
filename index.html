<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>UptimeMachines | Global Leaderboard</title>
</head>
<body class="bg-[#0b0f1a] text-gray-100 font-sans selection:bg-cyan-500">

<div class="max-w-5xl mx-auto px-4 py-12">
    <div class="text-center mb-12">
        <h1 class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600">
            UPTIME MACHINES
        </h1>
        <p class="text-gray-400 uppercase tracking-widest text-sm mt-2">World Ranking System</p>
    </div>

    <div class="overflow-x-auto bg-slate-900/50 rounded-2xl p-4 shadow-2xl">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-800/50 text-xs uppercase tracking-widest text-gray-400">
                <tr>
                    <th class="p-4">Rank</th>
                    <th class="p-4">Machine Name</th>
                    <th class="p-4">Uptime</th>
                    <th class="p-4 text-right">Status</th>
                </tr>
            </thead>
            <tbody id="machine-table-body" class="divide-y divide-slate-700">
                <!-- JS ще попълва -->
            </tbody>
        </table>
    </div>
</div>

<script>
async function loadMachines() {
    try {
        // Ако използваш Apache reverse proxy
        const res = await fetch("/api/machines");
        const machines = await res.json();
        const tbody = document.getElementById("machine-table-body");
        tbody.innerHTML = "";

        machines.forEach((m,index)=>{
            const tr = document.createElement("tr");
            tr.className = "hover:bg-gray-800/30 transition-colors";

            // Зелен за Online, червен за Offline
            const statusColor = m.status === "Online" ? "bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]" 
                                                     : "bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.6)]";

            tr.innerHTML = `
                <td class="p-4 font-mono text-cyan-400">#${index+1}</td>
                <td class="p-4 font-bold">${m.name}<div class="text-xs text-gray-400">Machine Info</div></td>
                <td class="p-4 font-mono text-blue-400">${formatUptime(m.total_seconds)}</td>
                <td class="p-4 text-right">
                    <span class="inline-block w-3 h-3 rounded-full ${statusColor}"></span>
                </td>
            `;
            tbody.appendChild(tr);
        });
    } catch(err) {
        console.error("Error loading machines:", err);
    }
}

function formatUptime(totalSeconds){
    let s = totalSeconds;
    const days = Math.floor(s/86400); s%=86400;
    const hours = Math.floor(s/3600); s%=3600;
    const mins = Math.floor(s/60); s%=60;
    return `${days}:${hours}:${mins}:${s}`;
}

// Зареждане първо + обновяване на всеки 10 сек
loadMachines();
setInterval(loadMachines, 10000);
</script>

</body>
</html>
