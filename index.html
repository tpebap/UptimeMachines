<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UptimeMachines | Global Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-gray-100 font-sans selection:bg-cyan-500">

<div class="max-w-5xl mx-auto px-4 py-12">
    <!-- Заглавие -->
    <div class="text-center mb-16">
        <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 drop-shadow-sm">
            UPTIME MACHINES
        </h1>
        <p class="mt-4 text-gray-500 uppercase tracking-[0.3em] text-sm">World Ranking Systems</p>
    </div>

    <!-- Статистика -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 backdrop-blur-xl">
            <p class="text-gray-500 text-xs uppercase mb-1">Total Machines</p>
            <p id="total-machines" class="text-2xl font-bold text-cyan-400 tracking-wider">0</p>
        </div>
        <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 backdrop-blur-xl">
            <p class="text-gray-500 text-xs uppercase mb-1">Total Online Time</p>
            <p id="total-time" class="text-2xl font-bold text-blue-400 tracking-wider">0 Days</p>
        </div>
        <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 backdrop-blur-xl">
            <p class="text-gray-500 text-xs uppercase mb-1">Live Now</p>
            <p id="live-count" class="text-2xl font-bold text-green-400 tracking-wider animate-pulse">0</p>
        </div>
    </div>

    <!-- Таблица -->
    <div class="bg-slate-900/40 rounded-3xl border border-slate-800 overflow-hidden backdrop-blur-md shadow-2xl">
        <table class="w-full text-left">
            <thead class="bg-slate-800/50 text-xs uppercase tracking-widest text-gray-500">
                <tr>
                    <th class="p-6">Rank</th>
                    <th class="p-6">Machine Name</th>
                    <th class="p-6">Uptime</th>
                    <th class="p-6 text-right">Status</th>
                </tr>
            </thead>
            <tbody id="machine-table" class="divide-y divide-slate-800">
                <!-- Машини ще се зареждат динамично -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // ============================
    // === НАСТРОЙКИ / СМЯНА ====
    // ============================
    // Това е URL на твоя Go backend
    const BACKEND_URL = 'https://devilshell.eu.org/api/machines';
    // ============================

    async function loadMachines() {
        try {
            const res = await fetch(BACKEND_URL);
            const machines = await res.json();

            const tableBody = document.getElementById('machine-table');
            const liveCountElem = document.getElementById('live-count');
            const totalMachinesElem = document.getElementById('total-machines');
            const totalTimeElem = document.getElementById('total-time');

            tableBody.innerHTML = '';

            let liveCount = 0;
            let totalSecondsSum = 0;

            machines.forEach((m, index) => {
                totalSecondsSum += m.total_seconds;
                if (m.status === 'Online') liveCount++;

                const days = Math.floor(m.total_seconds / 86400);
                const hours = Math.floor((m.total_seconds % 86400) / 3600);
                const minutes = Math.floor((m.total_seconds % 3600) / 60);
                const seconds = m.total_seconds % 60;

                const uptimeText = `${days}:${hours}:${minutes}:${seconds}`;

                const statusColor = m.status === 'Online' ?
                    'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]' :
                    'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.6)]';

                const row = document.createElement('tr');
                row.className = 'hover:bg-cyan-500/5 transition-colors group';
                row.innerHTML = `
                    <td class="p-6 font-mono text-cyan-400 text-xl">#${index + 1}</td>
                    <td class="p-6">
                        <div class="font-bold text-lg group-hover:text-cyan-300">${m.name}</div>
                        <div class="text-xs text-gray-500">Machine Info</div>
                    </td>
                    <td class="p-6 font-mono text-blue-400 text-lg tracking-tighter">
                        <span class="uptime" data-seconds="${m.total_seconds}">${uptimeText}</span>
                    </td>
                    <td class="p-6 text-right">
                        <span class="inline-block w-2 h-2 rounded-full ${statusColor}"></span>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            totalMachinesElem.textContent = machines.length;
            liveCountElem.textContent = liveCount;
            totalTimeElem.textContent = `${Math.floor(totalSecondsSum/86400)} Days`;

            // Стартиране на live таймери
            document.querySelectorAll('.uptime').forEach(span => {
                let totalSeconds = parseInt(span.dataset.seconds);
                setInterval(() => {
                    totalSeconds++;
                    const days = Math.floor(totalSeconds / 86400);
                    const hours = Math.floor((totalSeconds % 86400) / 3600);
                    const minutes = Math.floor((totalSeconds % 3600) / 60);
                    const seconds = totalSeconds % 60;
                    span.textContent = `${days}:${hours}:${minutes}:${seconds}`;
                }, 1000);
            });

        } catch (err) {
            console.error('Failed to load machines:', err);
        }
    }

    // Зареждане веднага и на всеки 30 сек.
    loadMachines();
    setInterval(loadMachines, 30000);
</script>
</body>
</html>
