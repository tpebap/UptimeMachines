<!DOCTYPE html>
<html lang="bg">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>UptimeMachines | Online status</title>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 mb-4">
            UPTIME MACHINES
        </h1>
        <p class="text-slate-400 text-xl tracking-widest uppercase">System Status: <span class="text-green-500 animate-pulse">Live</span></p>
        
        <div class="mt-10 p-6 bg-slate-800 rounded-xl border border-slate-700 shadow-2xl w-80">
            <div class="flex justify-between items-center mb-4">
                <span class="text-sm font-bold">Top Machine:</span>
                <span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded">tpebap_PC</span>
            </div>
            <div class="text-4xl font-mono text-center">124:12:05</div>
            <div class="text-center text-xs text-slate-500 mt-2 italic">Days : Hours : Mins</div>
        </div>

        <button class="mt-12 px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-full font-bold transition-all transform hover:scale-110">
            Download Client
        </button>
    </div>
</body>
</html>
